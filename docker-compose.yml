services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: was
      POSTGRES_USER: was
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-was_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U was"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3004:3000"
    environment:
      - DATABASE_URL=postgresql://was:${POSTGRES_PASSWORD:-was_dev_password}@postgres:5432/was
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker-oref-current:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ["node", "dist/workers/oref-current.js"]
    environment:
      - DATABASE_URL=postgresql://was:${POSTGRES_PASSWORD:-was_dev_password}@postgres:5432/was
      - OREF_BASE_URL=${OREF_BASE_URL:-https://www.oref.org.il}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker-oref-history:
